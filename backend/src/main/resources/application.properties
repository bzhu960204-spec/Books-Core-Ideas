spring.application.name=books-core-ideas
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/booksdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Run migration SQL after Hibernate schema update
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:migrate.sql

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# CORS — overridden by APP_CORS_ALLOWED_ORIGINS env var at runtime
app.cors.allowed-origins=http://localhost:5173
